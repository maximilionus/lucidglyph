<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!--
    An attempt to fix the icon fonts emboldening after autofitter driver
    stem-darkening.

    Disabling the hinting turns off the darkening.

    This will only work with fonts installed on the system and **not** delivered
    through the web browser, where target="font" tests are powerless.

    Yes, I know it looks terrible, but <test> element can not contain multiple
    test strings due to the: https://bugs.freedesktop.org/show_bug.cgi?id=33644
  -->
  <description>Nescessary tweaks for a correct icon-type font rendering after stem-darkening</description>

  <match target="font">
                              <!-- match all versions -->
    <test name="family" qual="any" compare="contains">
      <string>Font Awesome</string>
    </test>
    <edit name="hinting" mode="assign">
      <bool>false</bool>
    </edit>
    <edit name="embolden" mode="assign">
      <bool>false</bool>
    </edit>
  </match>

  <match target="font">
    <test name="family" qual="any" compare="eq">
      <string>codicon</string>
    </test>
    <edit name="hinting" mode="assign">
      <bool>false</bool>
    </edit>
    <edit name="embolden" mode="assign">
      <bool>false</bool>
    </edit>
  </match>

  <match target="font">
    <test name="family" qual="any" compare="eq">
      <string>Google Symbols</string>
    </test>
    <edit name="hinting" mode="assign">
      <bool>false</bool>
    </edit>
    <edit name="embolden" mode="assign">
      <bool>false</bool>
    </edit>
  </match>

  <match target="font">
    <test name="family" qual="any" compare="eq">
      <string>Material Symbols</string>
    </test>
    <edit name="hinting" mode="assign">
      <bool>false</bool>
    </edit>
    <edit name="embolden" mode="assign">
      <bool>false</bool>
    </edit>
  </match>
</fontconfig>
