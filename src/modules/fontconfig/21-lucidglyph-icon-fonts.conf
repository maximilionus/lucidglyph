<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!--
    Experimental fix for the icon-type fonts over-emboldening after
    stem-darkening through autofitter driver. Works with any font, even web
    delivered.

    Disabling the hinting turns off the darkening.
  -->
  <description>Detect icon-type fonts and apply the required tweaks for the correct rendering</description>

  <match target="font">
    <!-- Font lacks ASCII (&) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x0026</int></charset>
    </test>
    <!-- Font lacks Cyrillic (А) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x0410</int></charset>
    </test>
    <!-- Font lacks Greek (α) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x03B1</int></charset>
    </test>
    <!-- Font lacks Arabic (ع) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x0639</int></charset>
    </test>
    <!-- Font lacks CJK Unified Ideographs (中) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x4E2D</int></charset>
    </test>
    <!-- Font lacks Hebrew (א) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x05D0</int></charset>
    </test>
    <!-- Font lacks Devanagari (अ) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x0905</int></charset>
    </test>
    <!-- Font lacks Thai (ก) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x0E01</int></charset>
    </test>
    <!-- Font lacks Georgian (ა) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x10D0</int></charset>
    </test>
    <!-- Font lacks Armenian (Ա) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x0531</int></charset>
    </test>
    <!-- Font lacks Ethiopic (አ) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x12A0</int></charset>
    </test>
    <!-- Font lacks Tamil (அ) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x0B85</int></charset>
    </test>
    <!-- Font lacks Bengali (অ) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x0985</int></charset>
    </test>

    <edit name="hinting" mode="assign">
      <bool>false</bool>
    </edit>
    <edit name="embolden" mode="assign">
      <bool>false</bool>
    </edit>
  </match>

  <match target="font">
    <!-- Font lacks ASCII (Space) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x0020</int></charset>
    </test>
    <!-- Font lacks Cyrillic (А) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x0410</int></charset>
    </test>
    <!-- Font lacks Greek (α) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x03B1</int></charset>
    </test>
    <!-- Font lacks Arabic (ع) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x0639</int></charset>
    </test>
    <!-- Font lacks CJK Unified Ideographs (中) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x4E2D</int></charset>
    </test>
    <!-- Font lacks Hebrew (א) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x05D0</int></charset>
    </test>
    <!-- Font lacks Devanagari (अ) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x0905</int></charset>
    </test>
    <!-- Font lacks Thai (ก) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x0E01</int></charset>
    </test>
    <!-- Font lacks Georgian (ა) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x10D0</int></charset>
    </test>
    <!-- Font lacks Armenian (Ա) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x0531</int></charset>
    </test>
    <!-- Font lacks Ethiopic (አ) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x12A0</int></charset>
    </test>
    <!-- Font lacks Tamil (அ) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x0B85</int></charset>
    </test>
    <!-- Font lacks Bengali (অ) -->
    <test name="charset" compare="not_contains">
      <charset><int>0x0985</int></charset>
    </test>

    <edit name="hinting" mode="assign">
      <bool>false</bool>
    </edit>
    <edit name="embolden" mode="assign">
      <bool>false</bool>
    </edit>
  </match>
</fontconfig>
