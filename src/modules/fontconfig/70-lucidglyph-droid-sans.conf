<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <description>Replace certain parts of Droid Sans typeface</description>

  <!--
    Stem-darkening does not work well with fonts stated below, causing
    characters over-emboldening. Most of the software will automatically use
    Noto fonts for hieroglyph characters, but there are some exceptions like
    Chromium and GNOME shell, that will fall back to Droid Sans because of the
    higher fontconfig priority. This is the main reason we replace these fonts.
  -->
  <alias>
    <family>Droid Sans Fallback</family>
    <prefer>
      <family>Noto Sans CJK SC</family>
      <family>Noto Sans CJK TC</family>
      <family>Noto Sans CJK HK</family>
      <family>Noto Sans CJK JP</family>
      <family>Noto Sans CJK KR</family>
      <family>VL Gothic</family>
    </prefer>
  </alias>

  <alias>
    <family>Droid Sans Japanese</family>
    <prefer>
      <family>Noto Sans CJK JP</family>
    </prefer>
  </alias>
</fontconfig>
