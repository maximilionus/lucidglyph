<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!--
    Attempts to fix the icon fonts emboldening after autofitter driver
    stem-darkening with default x1,y1 darkening values.

    This will only work if the target font is installed on the system and
    **not** provided by a CDN inside the web browser (where fontconfig tests are
    powerless)
  -->
  <match target="font">
    <test name="family" qual="any">
      <string>FontAwesome</string>
      <string>Noto Color Emoji</string>
      <string>codicon</string>
      <string>Google Symbols</string>
    </test>
    <edit name="hinting" mode="assign">
      <bool>false</bool>
    </edit>
  </match>
</fontconfig>
